<!-- @dsCard group="Main Menu" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Start Screen</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #00000a;
    font-family: 'Courier New', monospace;
    color: #c0c8e0;
    font-size: 12px;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  /* faint starfield wash so the menu reads as in-game */
  body::before {
    content: "";
    position: fixed;
    inset: 0;
    background:
      radial-gradient(1px 1px at 20% 30%, rgba(255,255,255,0.6), transparent),
      radial-gradient(1px 1px at 70% 60%, rgba(255,255,255,0.4), transparent),
      radial-gradient(1px 1px at 40% 80%, rgba(255,255,255,0.5), transparent),
      radial-gradient(1px 1px at 85% 20%, rgba(255,255,255,0.3), transparent);
    pointer-events: none;
  }

  .menu {
    position: relative;
    text-align: center;
  }

  .title {
    font-size: 56px;
    letter-spacing: 14px;
    color: #aad0ff;
    text-shadow: 0 0 24px rgba(70,120,200,0.5);
    margin-bottom: 6px;
  }

  .subtitle {
    font-size: 11px;
    letter-spacing: 5px;
    color: rgba(140,180,255,0.55);
    margin-bottom: 56px;
  }

  .buttons {
    display: flex;
    flex-direction: column;
    gap: 14px;
    width: 240px;
    margin: 0 auto;
  }

  .btn {
    padding: 12px 0;
    background: transparent;
    border: 1px solid rgba(70,120,200,0.35);
    color: rgba(140,180,255,0.8);
    font-family: monospace;
    font-size: 13px;
    letter-spacing: 4px;
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.15s;
  }

  .btn:hover {
    background: rgba(70,120,200,0.12);
    color: #aad0ff;
    border-color: rgba(70,120,200,0.6);
  }

  .footer {
    position: fixed;
    bottom: 14px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 10px;
    letter-spacing: 3px;
    color: rgba(140,180,255,0.3);
  }
</style>
</head>
<body>
  <div class="menu">
    <div class="title">ORBITALS</div>
    <div class="subtitle">A SPACE FLIGHT SIMULATOR</div>
    <div class="buttons">
      <button class="btn">NEW FLIGHT</button>
      <button class="btn">CONTINUE</button>
      <button class="btn">LOAD GAME</button>
      <button class="btn">ASSEMBLY (VAB)</button>
    </div>
  </div>
  <div class="footer">v0.7 &middot; PRESS ENTER TO LAUNCH</div>
</body>
</html>
